<meta charset="UTF-8">

<title>料理ツール</title>

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#f3f7ff;
  --card:#ffffff;
  --main:#7aa8ff;
  --main2:#9dc0ff;
  --text:#2f3440;
  --sub:#6b7280;
  --shadow:0 8px 24px rgba(0,0,0,0.08);
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:"Mochiy Pop One", sans-serif;
  background:
    linear-gradient(180deg,#eef4ff 0%,#f8fbff 100%);
  color:var(--text);
}

/* ===== HEADER ===== */
.top-area{
  position:sticky;
  top:0;
  z-index:9999;
  backdrop-filter:blur(12px);
  background:rgba(255,255,255,0.75);
  border-bottom:1px solid rgba(255,255,255,0.5);
  padding:14px;
}

.site-title{
  font-size:22px;
  margin-bottom:12px;
  color:#4d6bb3;
}

/* ===== SEARCH ===== */
.search-wrapper{
  position:relative;
}

.search-wrapper input{
  width:100%;
  border:none;
  outline:none;
  padding:14px 48px 14px 18px;
  border-radius:18px;
  background:white;
  box-shadow:var(--shadow);
  font-family:"Mochiy Pop One", sans-serif;
  font-size:14px;
}

.clear-btn{
  position:absolute;
  right:12px;
  top:50%;
  transform:translateY(-50%);
  border:none;
  background:#edf2ff;
  width:30px;
  height:30px;
  border-radius:50%;
  cursor:pointer;
  display:none;
}

/* ===== CONTAINER ===== */
.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

/* ===== TOOL BAR ===== */
.tool-panel{
  background:var(--card);
  border-radius:24px;
  padding:18px;
  margin-bottom:20px;
  box-shadow:var(--shadow);
}

.panel-title{
  font-size:16px;
  margin-bottom:12px;
  color:#5d78b8;
}

/* ===== BUTTON ===== */
button{
  border:none;
  border-radius:999px;
  padding:10px 16px;
  background:linear-gradient(
    135deg,
    var(--main),
    var(--main2)
  );
  color:white;
  cursor:pointer;
  font-family:"Mochiy Pop One", sans-serif;
  font-size:12px;
  transition:0.2s;
  margin-right:8px;
  margin-top:6px;
}

button:hover{
  transform:translateY(-2px);
}

/* ===== SELECT ===== */
select{
  border:none;
  border-radius:14px;
  padding:10px;
  background:#f2f6ff;
  font-family:"Mochiy Pop One", sans-serif;
  margin-bottom:10px;
}

/* ===== CARD ===== */
.card{
  background:
    linear-gradient(
      135deg,
      #ffffff 0%,
      #f7faff 100%
    );
  border-radius:24px;
  padding:14px;
  margin-bottom:18px;
  display:flex;
  gap:14px;
  align-items:center;
  box-shadow:var(--shadow);
  cursor:pointer;
  transition:0.2s;
}

.card:hover{
  transform:translateY(-3px);
}

.card img{
  width:90px;
  height:90px;
  border-radius:20px;
  object-fit:cover;
  border:3px solid #ffffff;
  background:#eef3ff;
}

.food-info{
  flex:1;
}

.food-name{
  font-size:18px;
  margin-bottom:8px;
  color:#42548d;
}

.info-row{
  font-size:13px;
  margin-bottom:6px;
}

/* ===== RANK ===== */
.rankS{
  color:#ff9800;
}

.rankA{
  color:#41b66f;
}

.rankB{
  color:#5f87ff;
}

.rankC{
  color:#999;
}

/* ===== DETAIL ===== */
.detail{
  background:white;
  border-radius:20px;
  padding:18px;
  margin-top:-8px;
  margin-bottom:18px;
  box-shadow:var(--shadow);
}

.hidden{
  display:none;
}

/* ===== UPDATE ===== */
.update-text{
  text-align:center;
  font-size:11px;
  color:#8a94a7;
  margin-top:12px;
  margin-bottom:20px;
}

/* ===== MOBILE ===== */
@media(max-width:700px){

.card{
    align-items:flex-start;
  }

.card img{
    width:78px;
    height:78px;
  }

.food-name{
    font-size:15px;
  }
}

</style>
</head>

<div class="top-area">

</div>

let filteredFoods=[...foods];
const list=document.getElementById("list");

// 利益
function getProfit(f, star){
  return f.prices[star] - f.cost;
}

// ランク
function getRank(p){
  if(p >= 1000) return "S";
  if(p >= 500) return "A";
  if(p >= 200) return "B";
  return "C";
}

// 時給
function calcHourly(f, star){
  if(!f.time) return 0;
  return Math.round((getProfit(f,star)/f.time)*60);
}

// 描画
function renderList(){

  list.innerHTML="";

  const star =
    document.getElementById("starSelect").value;

  const showHourly =
    document.getElementById("toggleHourly").checked;

  filteredFoods.forEach((f,i)=>{

    const profit = getProfit(f,star);
    const rank = getRank(profit);
    const hourly = calcHourly(f,star);

    list.innerHTML += `

    <div
      class="card"
      onclick="toggleDetail(${i})"
    >

      <img src="${f.image}">

      <div class="food-info">

        <div class="food-name">
          ${f.name}
        </div>

        <div class="info-row">
          💰 利益：${profit}
        </div>

        <div class="info-row rank${rank}">
          🏆 ランク：${rank}
        </div>

        ${
          showHourly
          ? `
          <div class="info-row">
            ⏰ 時給：${hourly}
          </div>
          `
          : ""
        }

      </div>

    </div>

    <div
      id="detail${i}"
      class="detail hidden"
    >

      <b>売価</b>

      <br><br>

      ${
        f.prices
        .map((p,i)=>
          `★${i+1}：${p}`
        )
        .join("<br>")
      }

      <br><br>

      <b>素材</b>

      <br><br>

      ${f.materials.join("<br>")}

    </div>

    `;
  });

}

// ソート
function sortByProfit(){
  const star = document.getElementById("starSelect").value;
  filteredFoods.sort((a,b)=>getProfit(b,star)-getProfit(a,star));
  renderList();
}

function sortByHourly(){
  const star = document.getElementById("starSelect").value;
  filteredFoods.sort((a,b)=>calcHourly(b,star)-calcHourly(a,star));
  renderList();
}

// 詳細
function toggleDetail(i){
  document.getElementById("detail"+i).classList.toggle("hidden");
}

// 検索
function filterFoods(){
  const input =
    document.getElementById("search");
  const keyword =
    input.value.toLowerCase();
  document.querySelector(".clear-btn").style.display =
    keyword ? "block" : "none";
  filteredFoods = foods.filter(f =>
    f.name.toLowerCase().includes(keyword)
  );
  renderList();
}

function clearSearch(){
  document.getElementById("search").value="";
  filteredFoods=[...foods];
  document.querySelector(".clear-btn").style.display="none";
  renderList();
}

// セレクト
const selectA=document.getElementById("foodA");
const selectB=document.getElementById("foodB");

foods.forEach((f,i)=>{
  selectA.innerHTML+=`<option value="${i}">${f.name}</option>`;
  selectB.innerHTML+=`<option value="${i}">${f.name}</option>`;
});

// 比較（利益ベース）
function compare(){

  const star = document.getElementById("starSelect").value;

  const a=foods[selectA.value];
  const b=foods[selectB.value];

  const profitA = getProfit(a,star);
  const profitB = getProfit(b,star);

  let winner = profitA > profitB ? a.name : b.name;

  document.getElementById("compareResult").innerHTML=`
  🏆 ${winner}<br>
  ${profitA} vs ${profitB}
  `;
}

renderList();
  
</script>
