<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>カウンター操作</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{ --gold-1:#f4dfa0; --gold-2:#c99a3f; --bg:#1b1710; --card:#2a2418; --line:#4a3f28; }
  *{ box-sizing:border-box; }
  body{
    margin:0; padding:20px; padding-bottom:60px;
    background:var(--bg); color:#efe6d8;
    font-family:'Shippori Mincho', serif;
    min-height:100vh;
  }
  h1{ font-size:16px; letter-spacing:0.08em; margin-bottom:16px; color:var(--gold-1); font-weight:700; }
  .card{
    background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:16px; margin-bottom:16px;
  }
  .card h2{ font-size:13px; opacity:0.75; margin-bottom:12px; font-weight:500; letter-spacing:0.05em; }
  #current{ font-size:14px; opacity:0.8; margin-bottom:16px; }
  #current b{ color:var(--gold-1); }
  input[type=text], input[type=number]{
    width:100%; padding:12px; font-size:18px; border-radius:8px;
    border:1px solid var(--line); background:#12100a; color:#efe6d8; margin-bottom:10px;
  }
  button{
    font-size:16px; padding:14px; border-radius:8px; border:none;
    background:linear-gradient(180deg, var(--gold-1), var(--gold-2));
    color:#2a2010; font-weight:700; cursor:pointer;
  }
  button:active{ filter:brightness(0.9); }
  .row{ display:flex; gap:10px; }
  .row button{ flex:1; }
  #big button{ font-size:26px; padding:18px; }
  #resetBtn{ width:100%; margin-top:10px; background:#3a3222; color:#c9bd9a; }
  #status{ font-size:12px; color:#ff8a8a; margin-bottom:10px; display:none; }
  #status.show{ display:block; }
</style>
</head>
<body>
  <h1>ハートピア配信 カウンター操作</h1>
  <div id="status">Firebaseに接続できません（firebase-config.jsの設定を確認）</div>
  <div id="current">現在の値: <b id="curVal">-</b> ／ ラベル: <b id="curLabel">-</b></div>

  <div class="card">
    <h2>数値を変更</h2>
    <div class="row" id="big">
      <button id="dec">-1</button>
      <button id="inc">+1</button>
    </div>
    <div class="row" style="margin-top:10px;">
      <input type="number" id="setValueInput" placeholder="任意の数値">
      <button id="setValueBtn">設定</button>
    </div>
    <button id="resetBtn">0にリセット</button>
  </div>

  <div class="card">
    <h2>文字（ラベル）を変更</h2>
    <input type="text" id="labelInput" placeholder="例: 討伐数 / 目標まで">
    <button id="setLabelBtn" style="width:100%;">ラベルを更新</button>
  </div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
  const statusEl = document.getElementById('status');
  let ref;

  function refresh(state){
    document.getElementById('curVal').textContent = state.value ?? 0;
    document.getElementById('curLabel').textContent = state.label ?? 'カウンター';
  }

  try {
    firebase.initializeApp(firebaseConfig);
    ref = firebase.database().ref('counters/' + COUNTER_ID);
    ref.on('value', (snap) => {
      statusEl.classList.remove('show');
      refresh(snap.val() || { value: 0, label: 'カウンター' });
    }, () => statusEl.classList.add('show'));
  } catch (e) {
    statusEl.classList.add('show');
  }

  document.getElementById('inc').onclick = () => {
    ref.child('value').transaction((cur) => (cur || 0) + 1);
  };
  document.getElementById('dec').onclick = () => {
    ref.child('value').transaction((cur) => (cur || 0) - 1);
  };
  document.getElementById('setValueBtn').onclick = () => {
    const v = document.getElementById('setValueInput').value;
    if (v === '') return;
    ref.child('value').set(Number(v));
    document.getElementById('setValueInput').value = '';
  };
  document.getElementById('resetBtn').onclick = () => {
    if (confirm('0にリセットしますか？')) ref.child('value').set(0);
  };
  document.getElementById('setLabelBtn').onclick = () => {
    const l = document.getElementById('labelInput').value;
    if (l === '') return;
    ref.child('label').set(l);
    document.getElementById('labelInput').value = '';
  };
</script>
</body>
</html>
